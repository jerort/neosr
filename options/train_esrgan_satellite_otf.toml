# ESRGAN OTF config for Airbus HD15 multispectral tiles (4-band R/G/B/NIR, ×2).
#
# GT tiles = HD15 (15 cm), produced by SOTER/scripts/superresolution/generate_dataset_images_16bits.py
# (per-band 99th-pct rescale into uint16 → read_tiff /65535 → [0,1]). LQ is degraded
# on the fly to ~30 cm. At inference, scale the 30 cm Pleiades input with the SAME
# per-band ceilings from that tiles' scale.json. Degradations are channel-agnostic
# (gaussian blur + downscale + gaussian noise) — JPEG/sinc/USM omitted (8-bit artifacts).

name = "train_esrgan_satellite_otf"
model_type = "image"
scale = 2
use_amp = true
bfloat16 = true
fast_matmul = true

[datasets.train]
type = "otf_multispectral"
dataroot_gt = 'D:\datasets\SOTER\ROI_SR\HD15_16bits_OTF\gt\'
patch_size = 64
batch_size = 8
augmentation = [ "none", "mixup", "cutmix", "resizemix", "cutblur" ]
aug_prob = [ 0.5, 0.1, 0.1, 0.1, 0.5 ]
# OTF degradation knobs:
blur_sigma_range = [ 0.2, 1.5 ]
noise_sigma_range = [ 0.0, 0.02 ]
downscale_mode = "bicubic"        # "bicubic" | "bilinear" | "area" | "nearest"

# Val = same areas as the 8-bit model, regenerated 4-band by
# generate_val_images_16bits.py. Generate it BEFORE training, or this errors on empty dirs.
[datasets.val]
name = "val"
type = "paired_multispectral"
dataroot_gt = 'D:\datasets\SOTER\ROI_SR\HD15_16bits_OTF\val\gt\'
dataroot_lq = 'D:\datasets\SOTER\ROI_SR\HD15_16bits_OTF\val\lq\'

[val]
val_freq = 1000

[path]

[network_g]
type = "esrgan"
num_in_ch = 4     # HD15: R, G, B, NIR
num_out_ch = 4

# Discriminator re-added (single-stage hybrid): the report's best model came from a
# 2-stage recipe (otf_base WITH GAN -> otf_soft 20k softening, gan=0). We collapse it
# to one run = otf_soft refinement losses + GAN throughout. The disc sees all 4 bands
# (model feeds the full tensor to net_d; rgb_subset only wraps the listed losses), so
# NIR gets adversarial supervision too — must be num_in_ch=4 or it crashes.
[network_d]
type = "unet"
num_in_ch = 4     # HD15: R, G, B, NIR

[train]
ema = 0.999
clamp = false

[train.optim_g]
type = "adan_sf"
lr = 8e-4
betas = [ 0.98, 0.92, 0.99 ]
weight_decay = 0.01
schedule_free = true
warmup_steps = 1600

[train.optim_d]
type = "adan_sf"
lr = 1e-4
betas = [ 0.98, 0.92, 0.99 ]
weight_decay = 0.01
schedule_free = true
warmup_steps = 600

# Losses = report's best OTF model (otf_soft) + GAN. mssim + ldl are channel-agnostic;
# consistency / perceptual / dists / msswd are RGB-locked, so they run through the
# rgb_subset wrapper on bands [0,1,2] = R,G,B (NIR not directly supervised). No L1/fdl.
[train.mssim_opt]
type = "mssim_loss"
in_channels = 4
L = 1.0           # tiles are pre-scaled to fill [0,1] after /65535
loss_weight = 1.0

[train.ldl_opt]
type = "ldl_loss"
criterion = "l1"
loss_weight = 1.0

[train.consistency_opt]
type = "rgb_subset_loss"
rgb_indices = [ 0, 1, 2 ]
loss_weight = 0.8
inner = { type = "consistency_loss" }

[train.perceptual_opt]
type = "rgb_subset_loss"
rgb_indices = [ 0, 1, 2 ]
loss_weight = 0.3
inner = { type = "vgg_perceptual_loss", criterion = "huber" }

[train.dists_opt]
type = "rgb_subset_loss"
rgb_indices = [ 0, 1, 2 ]
loss_weight = 0.1
inner = { type = "dists_loss" }

[train.msswd_opt]
type = "rgb_subset_loss"
rgb_indices = [ 0, 1, 2 ]
loss_weight = 0.05
inner = { type = "msswd_loss" }

# GAN on the full 4-band output. Weight kept low so the otf_soft losses stay dominant
# (soft character); raise toward ~0.3 (report otf_base territory) if SR comes out smooth.
[train.gan_opt]
type = "gan_loss"
gan_type = "bce"
loss_weight = 0.1

[logger]
total_iter = 200000
save_checkpoint_freq = 1000
use_tb_logger = true
